<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage Player</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #player { width: 100vw; height: 100vh; position: relative; }

    #img-el, #vid-el {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #status-bar {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: #ccc;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      max-width: 360px;
      word-break: break-all;
      pointer-events: none;
    }

    #status-text { display: block; }

    #progress {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(74, 222, 128, 0.9);
      transition: background 0.3s;
    }

    #progress-fill.paused {
      background: rgba(250, 204, 21, 0.9);
    }
  </style>
</head>
<body>
  <div id="player">
    <img id="img-el" alt="">
    <video id="vid-el" muted playsinline></video>
  </div>
  <div id="status-bar">
    <span id="status-text"></span>
    <div id="progress"><div id="progress-fill"></div></div>
  </div>

  <script>
    var BASE_URL = 'https://octopus-signage-player-production.up.railway.app';

    // ─── MediaCache: IndexedDB + Blob ────────────────────────────────────────
    // Görsel ve video binary'lerini IndexedDB'de blob olarak saklar.
    // Ağ kesildiğinde bile cached blob'lar üzerinden oynatma devam eder.
    var MediaCache = (function () {
      var DB_NAME = 'octopus-media-cache';
      var DB_VERSION = 1;
      var STORE = 'blobs';
      var db = null;

      function open() {
        return new Promise(function (resolve, reject) {
          if (db) { resolve(db); return; }
          var req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = function (e) {
            e.target.result.createObjectStore(STORE);
          };
          req.onsuccess = function (e) { db = e.target.result; resolve(db); };
          req.onerror = function (e) { reject(e.target.error); };
        });
      }

      function get(url) {
        return open().then(function (database) {
          return new Promise(function (resolve) {
            var req = database.transaction(STORE, 'readonly').objectStore(STORE).get(url);
            req.onsuccess = function () { resolve(req.result || null); };
            req.onerror = function () { resolve(null); };
          });
        }).catch(function () { return null; });
      }

      function put(url, blob) {
        return open().then(function (database) {
          return new Promise(function (resolve) {
            var req = database.transaction(STORE, 'readwrite').objectStore(STORE).put(blob, url);
            req.onsuccess = function () { resolve(); };
            req.onerror = function () { resolve(); };
          });
        }).catch(function () {});
      }

      function clear() {
        return open().then(function (database) {
          return new Promise(function (resolve) {
            var tx = database.transaction(STORE, 'readwrite');
            tx.objectStore(STORE).clear();
            tx.oncomplete = function () { resolve(); };
            tx.onerror = function () { resolve(); };
          });
        }).catch(function () {});
      }

      return { get: get, put: put, clear: clear };
    })();

    // ─── Player state ────────────────────────────────────────────────────────
    var LS_KEY = 'octopus:playlist';
    var DEFAULT_DURATION_MS = 10000;

    var imgEl = document.getElementById('img-el');
    var vidEl = document.getElementById('vid-el');
    var statusText = document.getElementById('status-text');
    var progressFill = document.getElementById('progress-fill');

    var playlist = [];
    var currentIndex = 0;
    var slideTimer = null;
    var progressTimer = null;
    var currentLabel = '';
    var slideStartMs = 0;
    var slideDurationMs = 0;
    var isPaused = false;
    var pausedElapsedMs = 0;

    // Aktif blob URL'leri takip et; clearSlide'da revoke edilir (memory leak önlemi)
    var activeBlobUrls = [];

    function revokeBlobUrls() {
      activeBlobUrls.forEach(function (u) {
        try { URL.revokeObjectURL(u); } catch (_) {}
      });
      activeBlobUrls = [];
    }

    // ─── UI helpers ──────────────────────────────────────────────────────────
    function setStatus(text) {
      statusText.textContent = text;
    }

    function setProgress(pct, paused) {
      var p = Math.max(0, Math.min(100, pct));
      progressFill.style.width = p + '%';
      if (paused) {
        progressFill.classList.add('paused');
      } else {
        progressFill.classList.remove('paused');
      }
    }

    function formatRemaining(ms) {
      var totalSec = Math.max(0, Math.floor(ms / 1000));
      var m = Math.floor(totalSec / 60);
      var s = totalSec % 60;
      return (m > 0 ? (m + ':') : '') + String(s).padStart(2, '0');
    }

    // ─── Playlist localStorage cache ─────────────────────────────────────────
    function saveToStorage(items) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(items)); } catch (_) {}
    }

    function loadFromStorage() {
      try {
        var raw = localStorage.getItem(LS_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return null;
    }

    function playlistsEqual(a, b) {
      if (!a || !b || a.length !== b.length) return false;
      return JSON.stringify(a) === JSON.stringify(b);
    }

    // ─── Media blob cache ────────────────────────────────────────────────────
    // Oynatma anında: cache'de blob varsa blob URL döner, yoksa orijinal URL'e fallback.
    function resolveUrl(url) {
      return MediaCache.get(url).then(function (blob) {
        if (blob) {
          var blobUrl = URL.createObjectURL(blob);
          activeBlobUrls.push(blobUrl);
          return blobUrl;
        }
        return url;
      }).catch(function () { return url; });
    }

    // Playlist yüklendikten sonra arka planda tüm medyayı prefetch eder.
    // Mevcut oynatmayı engellemez; her öğe için bir kez indirir.
    function prefetchPlaylist(items) {
      items.forEach(function (item) {
        MediaCache.get(item.url).then(function (existing) {
          if (existing) return;
          fetch(item.url)
            .then(function (res) {
              if (!res.ok) throw new Error('HTTP ' + res.status);
              return res.blob();
            })
            .then(function (blob) {
              return MediaCache.put(item.url, blob);
            })
            .then(function () {
              console.log('[cache] prefetched:', item.url.split('/').pop());
            })
            .catch(function (err) {
              console.warn('[cache] prefetch failed:', item.url.split('/').pop(), err.message);
            });
        });
      });
    }

    // ─── Server fetch ────────────────────────────────────────────────────────
    function fetchFromServer() {
      return fetch(BASE_URL + '/api/playlist')
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (data) {
          if (Array.isArray(data.playlist) && data.playlist.length > 0) return data.playlist;
          return null;
        })
        .catch(function (err) {
          console.warn('[player] playlist fetch failed:', err.message);
          return null;
        });
    }

    // ─── MQTT ack ────────────────────────────────────────────────────────────
    function postAck(event) {
      fetch(BASE_URL + '/api/ack', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(event),
      }).catch(function () {});
    }

    function ackOk(cmd, payload) {
      var event = {
        type: 'command_result',
        command: cmd.command,
        correlationId: cmd.correlationId,
        status: 'success',
      };
      if (payload) event.payload = payload;
      postAck(event);
    }

    function ackErr(cmd, code, message) {
      postAck({
        type: 'command_result',
        command: cmd.command,
        correlationId: cmd.correlationId,
        status: 'error',
        error: { code: code, message: message },
      });
    }

    // ─── Playback ────────────────────────────────────────────────────────────
    function clearProgressTimer() {
      if (progressTimer !== null) { clearInterval(progressTimer); progressTimer = null; }
      setProgress(0, false);
    }

    function clearSlide() {
      if (slideTimer !== null) { clearTimeout(slideTimer); slideTimer = null; }
      clearProgressTimer();
      revokeBlobUrls();
      imgEl.onload = null;
      imgEl.onerror = null;
      imgEl.style.display = 'none';
      vidEl.onended = null;
      vidEl.onerror = null;
      if (!vidEl.paused) vidEl.pause();
      vidEl.style.display = 'none';
      isPaused = false;
      pausedElapsedMs = 0;
    }

    function next() {
      if (isPaused) return;
      if (playlist.length === 0) return;
      currentIndex = (currentIndex + 1) % playlist.length;
      playItem(currentIndex);
    }

    function shortName(url) {
      try { return new URL(url).pathname.split('/').pop() || url; } catch (_) { return url; }
    }

    function startImageProgressTimer() {
      clearProgressTimer();
      progressTimer = setInterval(function () {
        if (isPaused) return;
        var elapsed = Date.now() - slideStartMs;
        var remaining = Math.max(0, slideDurationMs - elapsed);
        setProgress((elapsed / slideDurationMs) * 100, false);
        setStatus(currentLabel + '  |  ' + formatRemaining(remaining));
      }, 250);
    }

    function startVideoProgressTimer() {
      clearProgressTimer();
      progressTimer = setInterval(function () {
        var d = vidEl.duration;
        var t = vidEl.currentTime;
        if (!isFinite(d) || d <= 0) {
          setProgress(0, isPaused);
          setStatus(currentLabel + '  |  --:--');
          return;
        }
        var remainingMs = Math.max(0, (d - t) * 1000);
        setProgress((t / d) * 100, isPaused);
        setStatus(currentLabel + '  |  ' + formatRemaining(remainingMs) + (isPaused ? '  ⏸' : ''));
      }, 250);
    }

    // Her medya tipi için render fonksiyonu; yeni tip eklemek için buraya giriş yeterli.
    // resolveUrl: IndexedDB cache'de blob varsa blob URL, yoksa orijinal URL kullanır.
    var renderers = {
      image: function (item) {
        imgEl.style.display = 'block';
        imgEl.onerror = function () {
          setStatus('[!] Image failed to load — skipping');
          slideTimer = setTimeout(next, 2000);
        };
        imgEl.onload = function () {
          slideStartMs = Date.now();
          slideDurationMs = (item.duration != null ? item.duration * 1000 : DEFAULT_DURATION_MS);
          slideTimer = setTimeout(next, slideDurationMs);
          startImageProgressTimer();
        };
        resolveUrl(item.url).then(function (src) {
          imgEl.src = src;
        });
      },

      video: function (item) {
        vidEl.style.display = 'block';
        vidEl.onerror = function () {
          setStatus('[!] Video failed to load — skipping');
          slideTimer = setTimeout(next, 2000);
        };
        vidEl.onended = function () { next(); };
        resolveUrl(item.url).then(function (src) {
          vidEl.src = src;
          vidEl.load();
          var p = vidEl.play();
          if (p !== undefined) {
            p.catch(function () {
              setStatus('[!] Video playback failed — skipping');
              slideTimer = setTimeout(next, 2000);
            });
          }
          startVideoProgressTimer();
        });
      },
    };

    function playItem(index) {
      if (playlist.length === 0) return;
      clearSlide();
      var item = playlist[index];
      currentLabel = (index + 1) + '/' + playlist.length + '  ' + shortName(item.url);

      var renderer = renderers[item.type];
      if (!renderer) { next(); return; }
      renderer(item);
    }

    function startPlayback(items, resetIndex) {
      playlist = items;
      if (resetIndex) currentIndex = 0;
      playItem(currentIndex);
    }

    function loadAndPlay(isReload) {
      var cached = loadFromStorage();

      if (!isReload && cached && cached.length > 0) {
        startPlayback(cached, true);
        prefetchPlaylist(cached);
        setStatus('Checking for updates…');
      } else if (!isReload) {
        setStatus('Loading playlist…');
      }

      fetchFromServer().then(function (serverItems) {
        if (serverItems) {
          if (!playlistsEqual(serverItems, cached)) {
            saveToStorage(serverItems);
            startPlayback(serverItems, true);
          }
          prefetchPlaylist(serverItems);
          return;
        }

        if (cached && cached.length > 0) {
          setStatus('Offline — using cached playlist');
          if (!isReload) startPlayback(cached, true);
          return;
        }

        setStatus('No playlist found — retrying in 5s…');
        setTimeout(function () { loadAndPlay(false); }, 5000);
      });
    }

    // ─── Commands ────────────────────────────────────────────────────────────
    function cmdPlay(cmd) {
      if (!isPaused) { ackOk(cmd); return; }
      isPaused = false;

      var isVideo = vidEl.style.display !== 'none';
      var isImage = imgEl.style.display !== 'none';

      if (isVideo) {
        var p = vidEl.play();
        if (p !== undefined) {
          p.then(function () { ackOk(cmd); }).catch(function (e) { ackErr(cmd, 'PLAY_FAILED', e.message); });
        } else {
          ackOk(cmd);
        }
      } else if (isImage) {
        slideStartMs = Date.now() - pausedElapsedMs;
        var remaining = Math.max(100, slideDurationMs - pausedElapsedMs);
        slideTimer = setTimeout(next, remaining);
        startImageProgressTimer();
        pausedElapsedMs = 0;
        ackOk(cmd);
      } else {
        ackOk(cmd);
      }
    }

    function cmdPause(cmd) {
      if (isPaused) { ackOk(cmd); return; }
      isPaused = true;

      var isVideo = vidEl.style.display !== 'none';
      var isImage = imgEl.style.display !== 'none';

      if (isVideo) {
        vidEl.pause();
        ackOk(cmd);
      } else if (isImage) {
        pausedElapsedMs = Date.now() - slideStartMs;
        if (slideTimer !== null) { clearTimeout(slideTimer); slideTimer = null; }
        clearProgressTimer();
        setStatus(currentLabel + '  ⏸');
        ackOk(cmd);
      } else {
        ackOk(cmd);
      }
    }

    function cmdSetVolume(cmd) {
      var raw = cmd.payload && typeof cmd.payload.volume === 'number' ? cmd.payload.volume : null;
      if (raw === null || raw < 0 || raw > 100) {
        ackErr(cmd, 'INVALID_VOLUME', 'Volume must be a number between 0 and 100 (received: ' + raw + ')');
        return;
      }
      var normalized = raw > 1 ? raw / 100 : raw;
      vidEl.volume = normalized;
      ackOk(cmd, { volume: normalized, volumePct: Math.round(normalized * 100) });
    }

    function cmdScreenshot(cmd) {
      var isVideo = vidEl.style.display !== 'none';
      var isImage = imgEl.style.display !== 'none';

      if (!isVideo && !isImage) {
        ackErr(cmd, 'SCREENSHOT_FAILED', 'No media is currently visible on screen');
        return;
      }

      if (isVideo && vidEl.readyState < 2) {
        ackErr(cmd, 'SCREENSHOT_FAILED', 'Video is not ready yet (readyState=' + vidEl.readyState + ')');
        return;
      }

      if (isImage && !imgEl.complete) {
        ackErr(cmd, 'SCREENSHOT_FAILED', 'Image has not finished loading');
        return;
      }

      var currentUrl = isVideo ? vidEl.src : imgEl.src;
      var mediaType = isVideo ? 'video' : 'image';

      try {
        var canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        var ctx = canvas.getContext('2d');

        if (isVideo) {
          ctx.drawImage(vidEl, 0, 0, canvas.width, canvas.height);
        } else {
          ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
        }

        var base64 = canvas.toDataURL('image/png').split(',')[1];
        ackOk(cmd, { format: 'image/png', base64: base64 });
      } catch (e) {
        var isTainted = e.message && e.message.toLowerCase().indexOf('tainted') !== -1;
        var reason = isTainted
          ? 'Cross-origin ' + mediaType + ' cannot be captured due to browser security policy (CORS). URL: ' + currentUrl
          : (e.message || 'Unknown canvas error');
        ackErr(cmd, 'SCREENSHOT_FAILED', reason);
      }
    }

    function cmdRestart() {
      clearSlide();
      playlist = [];
      currentIndex = 0;
      loadAndPlay(false);
    }

    function handleCommand(cmd) {
      console.log('[player] command:', cmd.command, cmd.correlationId);
      switch (cmd.command) {
        case 'reload_playlist': loadAndPlay(true);  break;
        case 'restart_player':  cmdRestart();       break;
        case 'play':            cmdPlay(cmd);       break;
        case 'pause':           cmdPause(cmd);      break;
        case 'set_volume':      cmdSetVolume(cmd);  break;
        case 'screenshot':      cmdScreenshot(cmd); break;
      }
    }

    // ─── SSE ─────────────────────────────────────────────────────────────────
    var es = new EventSource(BASE_URL + '/events');
    es.onopen = function () {
      console.log('[player] SSE connected');
    };
    es.onmessage = function (e) {
      try { handleCommand(JSON.parse(e.data)); } catch (_) {}
    };
    es.onerror = function () {
      console.warn('[player] SSE error, will retry automatically');
    };

    loadAndPlay(false);
  </script>
</body>
</html>
