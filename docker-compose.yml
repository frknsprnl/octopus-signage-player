services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: signage-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  # Opsiyonel harici playlist servisi. Açmak için: docker compose --profile dev up
  mock-server:
    image: node:20-alpine
    container_name: signage-mock-server
    profiles: [dev]
    working_dir: /app
    volumes:
      - ./tools/mock-server:/app
    command: npm start
    ports:
      - "3000:3000"
    restart: unless-stopped

  player:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signage-player
    env_file: .env
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      # Harici kaynak için: PLAYLIST_ENDPOINT=http://mock-server:3000/playlist
      - WEB_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mosquitto
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
