<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage Player</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #player { width: 100vw; height: 100vh; position: relative; }

    #img-el, #vid-el {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #status-bar {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: #ccc;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      max-width: 340px;
      word-break: break-all;
      pointer-events: none;
    }

    #status-text { display: block; }

    #progress {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(74, 222, 128, 0.9);
    }
  </style>
</head>
<body>
  <div id="player">
    <img id="img-el" alt="">
    <video id="vid-el" muted playsinline></video>
  </div>
  <div id="status-bar">
    <span id="status-text"></span>
    <div id="progress"><div id="progress-fill"></div></div>
  </div>

  <script>
    var LS_KEY = 'octopus:playlist';
    var DEFAULT_DURATION_MS = 10000;

    var imgEl = document.getElementById('img-el');
    var vidEl = document.getElementById('vid-el');
    var statusText = document.getElementById('status-text');
    var progressFill = document.getElementById('progress-fill');

    var playlist = [];
    var currentIndex = 0;
    var slideTimer = null;
    var progressTimer = null;
    var currentLabel = '';
    var slideStartMs = 0;
    var slideDurationMs = 0;

    function setStatus(text) {
      statusText.textContent = text;
    }

    function setProgress(pct) {
      var p = Math.max(0, Math.min(100, pct));
      progressFill.style.width = p + '%';
    }

    function formatRemaining(ms) {
      var totalSec = Math.max(0, Math.floor(ms / 1000));
      var m = Math.floor(totalSec / 60);
      var s = totalSec % 60;
      return (m > 0 ? (m + ':') : '') + String(s).padStart(2, '0');
    }

    function clearProgressTimer() {
      if (progressTimer !== null) { clearInterval(progressTimer); progressTimer = null; }
      setProgress(0);
    }

    function saveToStorage(items) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(items)); } catch (_) {}
    }

    function loadFromStorage() {
      try {
        var raw = localStorage.getItem(LS_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return null;
    }

    function playlistsEqual(a, b) {
      if (!a || !b || a.length !== b.length) return false;
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function fetchFromServer() {
      return fetch('/api/playlist')
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data) {
          if (Array.isArray(data.playlist) && data.playlist.length > 0) return data.playlist;
          return null;
        })
        .catch(function(err) {
          console.warn('[player] playlist fetch failed:', err.message);
          return null;
        });
    }

    function clearSlide() {
      if (slideTimer !== null) { clearTimeout(slideTimer); slideTimer = null; }
      clearProgressTimer();
      imgEl.onload = null;
      imgEl.onerror = null;
      imgEl.style.display = 'none';
      vidEl.onended = null;
      vidEl.onerror = null;
      if (!vidEl.paused) vidEl.pause();
      vidEl.style.display = 'none';
    }

    function next() {
      if (playlist.length === 0) return;
      currentIndex = (currentIndex + 1) % playlist.length;
      playItem(currentIndex);
    }

    function shortName(url) {
      try { return new URL(url).pathname.split('/').pop() || url; } catch (_) { return url; }
    }

    function playItem(index) {
      if (playlist.length === 0) return;
      clearSlide();
      var item = playlist[index];
      currentLabel = (index + 1) + '/' + playlist.length + '  ' + shortName(item.url);

      if (item.type === 'image') {
        imgEl.style.display = 'block';
        imgEl.onerror = function() {
          setStatus('[!] Görsel yüklenemedi — atlanıyor');
          slideTimer = setTimeout(next, 2000);
        };
        imgEl.onload = function() {
          slideStartMs = Date.now();
          slideDurationMs = (item.duration != null ? item.duration * 1000 : DEFAULT_DURATION_MS);
          slideTimer = setTimeout(next, slideDurationMs);

          progressTimer = setInterval(function() {
            var elapsed = Date.now() - slideStartMs;
            var remaining = Math.max(0, slideDurationMs - elapsed);
            var pct = (elapsed / slideDurationMs) * 100;
            setProgress(pct);
            setStatus(currentLabel + '  |  ' + formatRemaining(remaining));
          }, 250);
        };
        imgEl.src = item.url;

      } else if (item.type === 'video') {
        vidEl.style.display = 'block';
        vidEl.onerror = function() {
          setStatus('[!] Video yüklenemedi — atlanıyor');
          slideTimer = setTimeout(next, 2000);
        };
        vidEl.onended = function() { next(); };
        vidEl.src = item.url;
        vidEl.load();
        var p = vidEl.play();
        if (p !== undefined) {
          p.catch(function() {
            setStatus('[!] Video oynatılamadı — atlanıyor');
            slideTimer = setTimeout(next, 2000);
          });
        }
        progressTimer = setInterval(function() {
          var d = vidEl.duration;
          var t = vidEl.currentTime;
          if (!isFinite(d) || d <= 0) {
            setProgress(0);
            setStatus(currentLabel + '  |  --:--');
            return;
          }
          var remainingMs = Math.max(0, (d - t) * 1000);
          setProgress((t / d) * 100);
          setStatus(currentLabel + '  |  ' + formatRemaining(remainingMs));
        }, 250);

      } else {
        next();
      }
    }

    function startPlayback(items, resetIndex) {
      playlist = items;
      if (resetIndex) currentIndex = 0;
      playItem(currentIndex);
    }

    function loadAndPlay(isReload) {
      var cached = loadFromStorage();

      if (!isReload && cached && cached.length > 0) {
        startPlayback(cached, true);
        setStatus('Liste güncelleniyor…');
      } else if (!isReload) {
        setStatus('Playlist yükleniyor…');
      }

      fetchFromServer().then(function(serverItems) {
        if (serverItems) {
          if (!playlistsEqual(serverItems, cached)) {
            saveToStorage(serverItems);
            startPlayback(serverItems, true);
          }
          return;
        }

        if (cached && cached.length > 0) {
          setStatus('Offline — önbellek kullanılıyor');
          if (!isReload) startPlayback(cached, true);
          return;
        }

        setStatus('Playlist bulunamadı — 5 sn sonra tekrar denenecek…');
        setTimeout(function() { loadAndPlay(false); }, 5000);
      });
    }

    // SSE: reload_playlist komutu gelince yeniden yükle
    var es = new EventSource('/events');
    es.onmessage = function(e) {
      try {
        var cmd = JSON.parse(e.data);
        if (cmd.command === 'reload_playlist') {
          loadAndPlay(true);
        }
      } catch (_) {}
    };

    loadAndPlay(false);
  </script>
</body>
</html>
