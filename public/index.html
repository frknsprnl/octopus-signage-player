<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MQTT Komutları</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 1rem;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .status {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1rem;
    }
    .status.connected { color: #4ade80; }
    .status.error { color: #f87171; }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.35rem;
      background: #2a2a2a;
      border-radius: 6px;
      font-size: 0.9rem;
      border-left: 3px solid #4ade80;
    }
    li time { color: #888; font-size: 0.8rem; }
    li .cmd { font-weight: 600; }
    li .correlation { color: #a78bfa; font-family: monospace; font-size: 0.8rem; }
    .empty { color: #666; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <h1>MQTT Komutları</h1>
  <p class="status" id="status">Bağlanıyor…</p>
  <ul id="list"></ul>
  <p class="empty" id="empty">Henüz komut gelmedi.</p>

  <script>
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const statusEl = document.getElementById('status');

    function addCommand(cmd) {
      empty.style.display = 'none';
      const li = document.createElement('li');
      const date = new Date(cmd.timestamp);
      li.innerHTML = [
        '<span class="cmd">' + escapeHtml(cmd.command) + '</span>',
        '<br><span class="correlation">' + escapeHtml(cmd.correlationId) + '</span>',
        ' <time>' + date.toLocaleTimeString('tr-TR') + '</time>',
        cmd.payload && Object.keys(cmd.payload).length ? '<br><small>' + escapeHtml(JSON.stringify(cmd.payload)) + '</small>' : ''
      ].join('');
      list.insertBefore(li, list.firstChild);
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    fetch('/api/commands')
      .then(r => r.json())
      .then(commands => {
        if (commands.length) empty.style.display = 'none';
        commands.forEach(addCommand);
      })
      .catch(() => {});

    const es = new EventSource('/events');
    es.onopen = () => {
      statusEl.textContent = 'Canlı bağlantı açık.';
      statusEl.className = 'status connected';
    };
    es.onmessage = (e) => {
      try {
        addCommand(JSON.parse(e.data));
      } catch (_) {}
    };
    es.onerror = () => {
      statusEl.textContent = 'SSE bağlantı hatası. Yeniden denenecek.';
      statusEl.className = 'status error';
    };
  </script>
</body>
</html>
